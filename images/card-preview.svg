<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Better Jacuzzi UI Card Preview</title>
  <desc id="desc">Illustration of a circular jacuzzi thermostat card with controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <g transform="translate(310 75)">
    <rect x="0" y="0" width="580" height="480" rx="30" fill="#111827" stroke="#334155" stroke-width="3" />
    <text x="40" y="55" fill="#e2e8f0" font-size="34" font-family="Arial, Helvetica, sans-serif">Better Jacuzzi UI</text>
    <circle cx="290" cy="250" r="145" fill="none" stroke="#1f2937" stroke-width="28" />
    <circle cx="290" cy="250" r="145" fill="none" stroke="url(#ring)" stroke-linecap="round" stroke-width="28" stroke-dasharray="680 910" transform="rotate(-130 290 250)" />
    <text x="290" y="245" text-anchor="middle" fill="#f8fafc" font-size="68" font-family="Arial, Helvetica, sans-serif">38°</text>
    <text x="290" y="285" text-anchor="middle" fill="#94a3b8" font-size="24" font-family="Arial, Helvetica, sans-serif">target 40°</text>
    <g fill="#1e293b" stroke="#334155" stroke-width="2">
      <rect x="55" y="355" width="98" height="74" rx="14" />
      <rect x="171" y="355" width="98" height="74" rx="14" />
      <rect x="287" y="355" width="98" height="74" rx="14" />
      <rect x="403" y="355" width="98" height="74" rx="14" />
    </g>
    <g fill="#cbd5e1" font-size="18" font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
      <text x="104" y="399">Power</text>
      <text x="220" y="399">Jets</text>
      <text x="336" y="399">Filter</text>
      <text x="452" y="399">Bubbles</text>
    </g>
  </g>
</svg>
